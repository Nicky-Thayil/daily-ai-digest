version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ai-digest-api
    container_name: ai-digest-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PORT: "8000"
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      # Mount source for hot-reload during local dev
      - ./app:/app/app
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ai-digest-api
    container_name: ai-digest-worker
    env_file:
      - .env
    command: >
      sh -c "celery -A app.workers.celery_app.celery_app worker --loglevel=info --pool=solo"
    volumes:
      - ./app:/app/app
    depends_on:
      api:
        condition: service_healthy